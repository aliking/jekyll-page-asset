<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.description %}{{ page.description }}{% else %}{{ site.description }}{% endif %}">
  <script>
    (function () {
      var storageKey = "site-theme";
      var savedTheme = localStorage.getItem(storageKey);
      var initialTheme = savedTheme === "light" || savedTheme === "dark" || savedTheme === "system" ? savedTheme : "light";
      document.documentElement.setAttribute("data-theme", initialTheme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="icon" type="image/png" href="{{ '/assets/site_media/favicon.png' | relative_url }}">
  {% seo %}
</head>
<body>
  <div style="display:flex">

    <aside style="
    width:400px;
     margin:16px;
     height:100vh;
     position: fixed;
     ">
        <h3>

          <a href="/">Home</a>
        </h3>
      {% assign projects = site.projects %}

      {% if projects.size > 0 %}
      <div style="display:flex; flex-direction: column;">
        {% for project in projects %}
        <h3>

          <a href="{{project.url}}">{{project.title}}</a>
        </h3>
        {% endfor %}
      </div>
      {% else %}
      <p style="color: #9898b8; font-style: italic; margin-top: 2rem;">Projects incoming - check back soon.</p>
      {% endif %}
      <div style="height:30px">

        <div id="page-asset-gallery-controls"></div>
      </div>
    </aside>
    <main class="site-main" id="main-content" style="max-width: 960px; margin: 0 0 0 auto; padding: 2rem 1rem 4rem; position: relative;">
      <div id="page-asset-gallery-lightbox"></div>
      {{ content }}
    </main>
  </div>

</body>
</html>
